  <line x1="8.5" y1="21" x2="23.5" y2="21" stroke="rgba(255,255,255,0.2)" stroke-width="0.8"/>
  <!-- OW text -->
  <text x="16" y="20.5" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="9" fill="url(#text-grad)" letter-spacing="-0.5">OW</text>
