  <!-- Globe lines — horizontal -->
  <ellipse cx="16" cy="16" rx="9" ry="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <ellipse cx="16" cy="16" rx="5" ry="9" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
  <line x1="7" y1="16" x2="25" y2="16" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
